name: KitsuneMagisk CI (Release only)

on:
  push:
    branches:
      - kitsune
      - dev
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    name: Build Release (no debug, no tests)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write
    env:
      JAVA_HOME_17_X64: /usr/lib/jvm/temurin-17-jdk-amd64
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs='-Xmx4g'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Temurin JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r26d (for AGP 8.x)
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Cargo (Rust)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # --- BUILD ---
      # Prefer the repo's build script if it exists; otherwise just assemble the app release.
      - name: Build (release only) via build.py if present
        id: buildpy
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f build.py ]]; then
            echo "Using build.py"
            # Typical Magisk/Kitsune build: skip tests, build release artifacts only
            python3 build.py -v all || python3 build.py all
          else
            echo "build.py not found; falling back to Gradle"
          fi

      - name: Build (release only) via Gradle fallback
        if: steps.buildpy.outcome == 'failure' || steps.buildpy.outcome == 'skipped'
        run: |
          chmod +x gradlew || true
          ./gradlew :app:assembleRelease -x test -x lint --no-daemon --stacktrace

      # --- ARTIFACTS ---
      - name: Locate artifacts
        id: locate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          # Collect common Magisk/Kitsune outputs
          find . -maxdepth 3 -type f \( -name "*Magisk*.apk" -o -name "*Kitsune*.apk" -o -name "*.zip" -o -name "*.img" \) -print -exec cp -v '{}' out/ \; || true
          # Gradle standard location (if fallback used)
          if compgen -G "app/build/outputs/apk/release/*.apk" > /dev/null; then
            cp -v app/build/outputs/apk/release/*.apk out/
          fi
          echo "artifact_count=$(ls -1 out | wc -l)" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        if: steps.locate.outputs.artifact_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.sha }}-release
          path: out/*
          if-no-files-found: warn

      # --- NO AVD TESTS ---
      # Explicitly omit emulator/AVD tests to keep the pipeline fast and deterministic.
