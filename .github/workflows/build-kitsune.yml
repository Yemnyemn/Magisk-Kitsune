name: Build Magisk Kitsune Lite

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: Yemnyemn/Magisk-Kitsune
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK + NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653" cmake

          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> local.properties

      - name: Apply Lite patches
        run: |
          # Hapus Zygisk, Support Us, Follow Us dari UI
          find app/src/main/res/layout -type f -name "fragment_home*.xml" -exec sed -i \
            -e '/Zygisk/d' \
            -e '/Support Us/d' \
            -e '/Follow Us/d' {} +

          sed -i -E '/zygiskStatus|supportUs|followUs/d' app/src/main/java/**/home/HomeFragment.* || true

          # Set enforce ke SuList
          sed -i 's/setEnforce.*false/setEnforce(true)/g' app/src/main/java/**/core/*SuList*.kt || true

          # Hapus libs x86/x64
          rm -rf app/src/main/jniLibs/x86* || true

          # Hapus stub dari hasil boot.img patched
          sed -i '/stub/d' scripts/boot_patch.sh || true

      - name: Build Release APK (default sign, no tests)
        run: ./gradlew --no-daemon clean :app:assembleRelease -x test

      - name: Collect APK
        run: mkdir -p output && cp app/build/outputs/apk/release/*.apk output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Magisk-Kitsune-Lite
          path: output/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: kitsune-lite-${{ github.run_number }}
          name: "Magisk Kitsune Lite Build ${{ github.run_number }}"
          draft: false
          prerelease: false
          files: output/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
