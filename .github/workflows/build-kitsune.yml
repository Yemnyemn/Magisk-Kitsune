name: Build Kitsune 27.2-4 Lite

on:
  workflow_dispatch:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

env:
  JAVA_VERSION: "17"
  ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
  NDK_VERSION: "26.1.10909125"
  BUILD_TOOLS: "34.0.0"
  PLATFORM: "android-34"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" \
            "platform-tools" \
            "platforms;${PLATFORM}" \
            "build-tools;${BUILD_TOOLS}" \
            "cmake;3.22.1" \
            "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> $GITHUB_ENV
          echo "NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> $GITHUB_ENV
          echo "${ANDROID_SDK_ROOT}/platform-tools" >> $GITHUB_PATH
          echo "${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}" >> $GITHUB_PATH

      - name: Apply Lite patches
        run: |
          set -euxo pipefail

          # --- 0) Hapus folder test ---
          rm -rf app/src/test app/src/androidTest
          find . -type d -name test -exec rm -rf {} + || true
          find . -type d -name androidTest -exec rm -rf {} + || true

          # --- 1) Hapus toggle Zygisk & menu DenyList ---
          if ls app/src/main/res/xml/*.xml >/dev/null 2>&1; then
            for f in app/src/main/res/xml/*.xml; do
              sed -i -E '/key *= *"zygisk"/d;/key *= *"denylist"/d' "$f" || true
              sed -i -E '/Zygisk/d;/Deny\s*List/d;/DenyList/d' "$f" || true
            done
          fi

          # --- 2) Paksa Enforce SuList = true ---
          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/kitsune_sulist_enforce.xml << 'EOF'
          <resources>
              <bool name="config_enforce_sulist">true</bool>
          </resources>
          EOF

          # --- 3) Batasi ABI ke ARM only ---
          if ls app/build.gradle* >/dev/null 2>&1; then
            # Hapus debug block
            sed -i -E '/signingConfigs\s*\{/,/}/d' app/build.gradle || true
            sed -i -E '/buildTypes\s*\{/,/}/d' app/build.gradle || true
            awk '{
              print $0
            } /android *\{/ && !p { p=1; print "    defaultConfig {"; print "        ndk {"; print "            abiFilters \"armeabi-v7a\", \"arm64-v8a\""; print "        }"; print "    }"; print "    packaging { jniLibs { excludes += [\"**/x86/**\",\"**/x86_64/**\"] } }"; }' \
              app/build.gradle > app/build.gradle.patched || true
            if [ -s app/build.gradle.patched ]; then mv app/build.gradle.patched app/build.gradle; fi
            find app -type d \( -name x86 -o -name x86_64 \) -exec rm -rf {} + || true
          fi

          # --- 4) Batasi target native hanya ARM ---
          if [ -f build.py ]; then
            sed -i -E 's/\[ *"arm" *, *"arm64" *, *"x86" *, *"x64" *\]/["arm","arm64"]/g' build.py || true
          fi

          # --- 5) Hapus modul stub ---
          if ls settings.gradle* >/dev/null 2>&1; then
            sed -i -E 's/include *\(":stub"\)//g' settings.gradle* || true
          fi
          PATCH_SH=$(git ls-files | grep -E 'boot_patch\.sh|scripts/boot_patch\.sh' | head -n1 || true)
          if [ -n "$PATCH_SH" ]; then
            sed -i -E '/stub|magisk\.apk|install_apk|PLACEHOLDER_APK/s/^/# REMOVED: /' "$PATCH_SH" || true
          fi

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Build Release APK (signed)
        run: |
          ./gradlew --no-daemon clean :app:assembleRelease -x test \
            -Pandroid.injected.signing.store.file=release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
          rm -rf app/build/outputs/apk/debug || true

      - name: Build native/ZIP (jika tersedia)
        run: |
          if [ -f build.py ]; then
            python3 build.py -v 27.2 --release || true
          else
            echo "build.py not found, skipping native ZIP build."
          fi

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find app/build/outputs -type f -name "*release*.apk" -exec cp -f {} artifacts/ \; || true
          find . -maxdepth 3 -type f -name "*.zip" -exec cp -f {} artifacts/ \; || true
          find artifacts -type f -iname "*debug*.apk" -delete || true
          ls -la artifacts || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: magisk-kitsune-lite-build
          path: artifacts
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            Automated Lite build for ${{ github.ref_name }}

            ✅ Zygisk & DenyList removed  
            ✅ Enforce SuList  
            ✅ ARM only (armeabi-v7a, arm64-v8a)  
            ✅ Stub removed  
            ✅ Debug build removed  
            ✅ Signed Release APK ready to install  
          files: artifacts/*
          draft: false
          prerelease: false
