name: Build Magisk Kitsune Lite 27.2-4

on:
  workflow_dispatch:
  push:
    tags:
      - 'v27.2-kitsune-4'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Force update submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --depth=1 || true
          # khusus zopfli (kadang gagal), clone ulang manual
          if [ ! -d "zopfli/.git" ]; then
            echo "Fixing zopfli submodule..."
            rm -rf zopfli
            git clone https://github.com/google/zopfli.git zopfli
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip zip unzip git

      - name: Install Python requirements
        run: |
          pip3 install --upgrade pip
          pip3 install -r requirements.txt || true

      - name: Setup Android SDK path
        run: |
          echo "ANDROID_HOME=$HOME/Android/Sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/Android/Sdk" >> $GITHUB_ENV

      - name: Cache Magisk NDK
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/magisk
          key: ${{ runner.os }}-magisk-ndk

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.rustup
          key: ${{ runner.os }}-rust

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle

      - name: Download Magisk NDK (ONDK)
        run: |
          ./build.py ndk

      - name: Build Magisk Kitsune Lite v27.2-4
        run: |
          git fetch --tags
          git checkout v27.2-kitsune-4 || echo "Building latest commit (tag not found)"
          ./build.py all

      - name: Remove x86/x86_64 libs from APK
        run: |
          mkdir -p out/armonly
          for apk in out/*.apk; do
            echo "Stripping $apk ..."
            unzip -q "$apk" -d tmp_apk
            rm -rf tmp_apk/lib/x86 tmp_apk/lib/x86_64
            cd tmp_apk
            zip -qr "../out/armonly/$(basename "${apk%.apk}-armonly.apk")" .
            cd ..
            rm -rf tmp_apk
          done

      - name: Upload ARM-only APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Magisk-Kitsune-Lite-27.2-4-ARM
          path: out/armonly/*.apk
