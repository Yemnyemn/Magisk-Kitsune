name: Build Kitsune 27.2-4 (SuList, no Zygisk, no x86, no stub)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    tags: [ "v**", "27.*" ]

permissions:
  contents: read

env:
  JAVA_VERSION: "17"
  ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
  NDK_VERSION: "26.1.10909125"
  BUILD_TOOLS: "34.0.0"
  PLATFORM: "android-34"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" \
            "platform-tools" \
            "platforms;${PLATFORM}" \
            "build-tools;${BUILD_TOOLS}" \
            "cmake;3.22.1" \
            "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> $GITHUB_ENV
          echo "NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> $GITHUB_ENV
          echo "${ANDROID_SDK_ROOT}/platform-tools" >> $GITHUB_PATH
          echo "${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}" >> $GITHUB_PATH

      - name: Show tree (top level)
        run: |
          pwd
          ls -la

      - name: Apply Kitsune-Lite patches (no Zygisk/DenyList, enforce SuList, no x86/x64, no stub)
        shell: bash
        run: |
          set -euxo pipefail

          # --- 0) Cari folder app & script patcher kalau ada ---
          APP_DIR=$(git ls-files | awk -F/ '/^app\/src\/main\//{print $1"/"$2"/"$3}' | head -n1 || true)
          APP_DIR=${APP_DIR:-app/src/main}
          RES_DIR="${APP_DIR}/res"
          VAL_DIR="${RES_DIR}/values"

          # --- 1) Sembunyikan toggle Zygisk & menu DenyList di UI (hapus preference) ---
          # Hilangkan baris yang mengandung key="zygisk" atau key="denylist" di semua XML res/xml
          if ls "${RES_DIR}/xml"/*.xml >/dev/null 2>&1; then
            for f in ${RES_DIR}/xml/*.xml; do
              sed -i -E '/key *= *"zygisk"/d;/key *= *"denylist"/d' "$f" || true
            done
          fi

          # Opsional: singkirkan item Zygisk/DenyList yang nongol sebagai teks judul
          if ls "${RES_DIR}/xml"/*.xml >/dev/null 2>&1; then
            for f in ${RES_DIR}/xml/*.xml; do
              sed -i -E '/Zygisk/d;/Deny\s*List/d;/DenyList/d' "$f" || true
            done
          fi

          # --- 2) Paksa Enforce SuList = true (tanpa toggle) ---
          mkdir -p "${VAL_DIR}"
          # Buat file bool override; jika app membaca dari resources, ini memaksa default 'true'
          cat > "${VAL_DIR}/kitsune_sulist_enforce.xml" << 'EOF'
          <resources>
              <bool name="config_enforce_sulist">true</bool>
          </resources>
          EOF

          # Coba “matikan” preferensi/feature flag via Gradle buildConfigField/resValue juga
          # (aman jika tidak dipakai — diabaikan)
          if ls app/build.gradle* >/dev/null 2>&1; then
            sed -i -E '/android *\{/,/\}/ {
              /defaultConfig *\{/ a\
\        buildConfigField("boolean","ZYGISK_ENABLED_DEFAULT","false")\
\        buildConfigField("boolean","ENFORCE_SULIST_DEFAULT","true")\
\        resValue "bool","config_enforce_sulist","true"
            }' app/build.gradle* || true
          fi

          # --- 3) Hapus ABI x86/x86_64 dari APK ---
          if ls app/build.gradle* >/dev/null 2>&1; then
            # Tambahkan abiFilters untuk hanya arm/arm64, dan exclude x86/x86_64 dari packaging
            awk '{
              print $0
            } /android *\{/ && !p { p=1; print "    defaultConfig {"; print "        ndk {"; print "            abiFilters \"armeabi-v7a\", \"arm64-v8a\""; print "        }"; print "    }"; print "    packaging { jniLibs { excludes += [\"**/x86/**\",\"**/x86_64/**\"] } }"; }' \
              app/build.gradle* > app/build.gradle.patched || true
            if [ -s app/build.gradle.patched ]; then mv app/build.gradle.patched app/build.gradle; fi

            # Bersih-bersih folder JNI x86/x86_64 bila ada arsip prebuilt
            find app -type d \( -name x86 -o -name x86_64 \) -print -exec rm -rf {} + || true
          fi

          # --- 4) Batasi build native hanya ARM (kalau ada script daftar target) ---
          if [ -f build.py ]; then
            sed -i -E 's/\[ *"arm" *, *"arm64" *, *"x86" *, *"x64" *\]/["arm","arm64"]/g' build.py || true
            sed -i -E 's/\[ *"x86" *, *"x64" *\]|\[ *"x86_64" *\]//g' build.py || true
          fi

          # --- 5) Hapus modul stub dari settings.gradle dan dependency terkait ---
          if ls settings.gradle* >/dev/null 2>&1; then
            sed -i -E 's/include *\(":stub"\)//g' settings.gradle* || true
          fi

          # --- 6) Cegah penyematan stub di boot_patch.sh (jika ada) ---
          PATCH_SH=$(git ls-files | grep -E 'boot_patch\.sh|scripts/boot_patch\.sh' | head -n1 || true)
          if [ -n "$PATCH_SH" ]; then
            sed -i -E '/stub|magisk\.apk|install_apk|PLACEHOLDER_APK/s/^/# REMOVED: /' "$PATCH_SH" || true
          fi

          # --- 7) Nonaktifkan jejak Zygisk di kode (soft guard; tidak fatal bila path tak cocok) ---
          # Matikan flag default Zygisk jika ada constants/Config*.kt
          for K in $(git ls-files | grep -E 'Config.*\.kt|Constants.*\.kt|Settings.*\.kt' || true); do
            sed -i -E 's/(ZYGISK_ENABLED_DEFAULT *[:=] *)true/\1false/g' "$K" || true
            sed -i -E 's/(ENFORCE_SULIST_DEFAULT *[:=] *)false/\1true/g' "$K" || true
          done

          # --- 8) Pastikan gradlew executable ---
          chmod +x ./gradlew || true

      - name: Build (APK release)
        run: |
          ./gradlew --no-daemon clean :app:assembleRelease

      - name: Build native/ZIP (jika tersedia)
        run: |
          if [ -f build.py ]; then
            python3 build.py -v 27.2 --release || true
          else
            echo "build.py not found, skipping native ZIP build."
          fi

      - name: Collect artifacts
        id: collect
        run: |
          mkdir -p artifacts
          # APK
          find app/build/outputs -type f -name "*release*.apk" -print -exec cp -f {} artifacts/ \; || true
          # ZIP hasil native/installer (jika ada)
          find . -maxdepth 3 -type f -name "*.zip" -print -exec cp -f {} artifacts/ \; || true
          # Catat list
          ls -la artifacts || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: magisk-kitsune-lite-build
          path: artifacts
          if-no-files-found: warn
